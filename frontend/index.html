<!doctype html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <!-- viewport-fit=cover: respeta las zonas seguras (notch) en modo standalone -->
  <meta name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>AgoraOps</title>
  <meta name="description" content="Soluciones de Gestión Integral" />
  <meta name="theme-color" content="#099dd7" />
  <!-- PWA en iOS: pantalla completa al abrir desde el icono de inicio -->
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="AgoraOps" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
  <!-- Pantallas de arranque iOS (PWA standalone): una por resolución de
       dispositivo; iOS elige la que coincide exactamente con su media query. -->
  <link rel="apple-touch-startup-image" href="/splash/apple-splash-750-1334.png"
    media="screen and (device-width: 375px) and (device-height: 667px) and (-webkit-device-pixel-ratio: 2) and (orientation: portrait)" />
  <link rel="apple-touch-startup-image" href="/splash/apple-splash-828-1792.png"
    media="screen and (device-width: 414px) and (device-height: 896px) and (-webkit-device-pixel-ratio: 2) and (orientation: portrait)" />
  <link rel="apple-touch-startup-image" href="/splash/apple-splash-1125-2436.png"
    media="screen and (device-width: 375px) and (device-height: 812px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)" />
  <link rel="apple-touch-startup-image" href="/splash/apple-splash-1170-2532.png"

  <link rel="apple-touch-startup-image" href="/splash/apple-splash-1179-2556.png"

  <link rel="apple-touch-startup-image" href="/splash/apple-splash-1242-2688.png"

</head>

</html>
